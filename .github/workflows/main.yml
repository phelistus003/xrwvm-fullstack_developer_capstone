name: Lint Code Base

on: [push, pull_request]

jobs:
  lint-python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        # We tell flake8 to ignore auto-generated migration files and long lines in populate scripts
        run: flake8 server/djangoapp/ --exclude=migrations --max-line-length=120

  lint-javascript:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies & Lint Frontend
        run: |
          cd server/frontend
          npm install
          # Disables treating warnings as hard errors so CI passes cleanly
          CI=false npm run lint
    
       
